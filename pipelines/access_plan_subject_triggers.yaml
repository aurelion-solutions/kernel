# access_plan_subject_triggers — fire access_plan.plan on subject-level events.
#
# All triggers in this file carry payload.subject_ref = Subject.id (the
# kernel Subject row UUID). access_plan.plan receives Subject.id via
# args.subject_ref for every routing key below.
#
# Covered routing keys:
#
#   - inventory.employee.updated       (any inventory employee change)
#   - inventory.nhi.updated            (any inventory NHI change)
#   - subject.replan.required          (explicit operator replan)
#   - inventory.nhi.expired            (deactivation)
#
# inventory.<entity>.updated carries:
#   { employee_id|nhi_id, subject_ref, subject_type, changes: {field: {old, new}} }
# subject_ref is Subject.id — exactly what access_plan.plan expects.
#
# For the *.updated events the trigger also uses match.changes to filter:
# we only replan when one of the planning-relevant fields actually moves
# (employment_status / org_unit_id / any attribute). The matcher uses
# JSONB containment, so a payload containing changes.employment_status
# satisfies `match: {changes: {employment_status: {}}}` — any nested
# value is accepted.
#
# Deduplification: upstream emitters MAY include an `idempotency_key`
# field. When absent the orchestrator falls back to a UUID — no dedup,
# safe.

pipeline:
  name: access_plan_subject_triggers
  version: 2
  schema_version: 1

  args:
    type: object
    required: [subject_ref]
    properties:
      subject_ref:
        type: string
        description: "Subject UUID (employee or NHI)"
      idempotency_key:
        type: string
        description: "Upstream-supplied key for deduplification"

  triggers:
    - type: mq
      routing_key: "inventory.employee.updated"
      match:
        changes:
          employment_status: {}
      args_from_payload:
        subject_ref: subject_ref
        idempotency_key: idempotency_key

    - type: mq
      routing_key: "inventory.employee.updated"
      match:
        changes:
          org_unit_id: {}
      args_from_payload:
        subject_ref: subject_ref
        idempotency_key: idempotency_key

    - type: mq
      routing_key: "inventory.nhi.updated"
      args_from_payload:
        subject_ref: subject_ref
        idempotency_key: idempotency_key

    - type: mq
      routing_key: "subject.replan.required"
      args_from_payload:
        subject_ref: subject_id
        idempotency_key: idempotency_key

    - type: mq
      routing_key: "inventory.nhi.expired"
      args_from_payload:
        subject_ref: subject_ref
        idempotency_key: idempotency_key

  steps:
    - name: plan
      engine: access_plan
      action: plan
      args:
        subject_ref: "${args.subject_ref}"
        idempotency_key: "${args.idempotency_key}"
      requires: []
