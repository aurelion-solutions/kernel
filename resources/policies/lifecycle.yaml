rules:
  # --- Employee base lifecycle ---

  - id: emp_term_wins
    kind: lifecycle
    when:
      subject.kind: employee
      subject.status: terminated
    then:
      abstract_state: disabled
      actions:
        - revoke_all_sessions
    precedence: 100

  - id: emp_pre_hire_not_yet
    kind: lifecycle
    when:
      subject.kind: employee
      subject.status: hired
      subject.start_date: "> now"
    then:
      abstract_state: pending
      actions:
        - schedule_evaluation_at: subject.start_date
    precedence: 50

  - id: emp_hire_day_enable
    kind: lifecycle
    when:
      subject.kind: employee
      subject.status: hired
      subject.start_date: "<= now"
    then:
      abstract_state: enabled
    precedence: 40

  - id: active_enable
    kind: lifecycle
    when:
      subject.kind: employee
      subject.status: active
    then:
      abstract_state: enabled
    precedence: 10

  # --- Employee grace / initiative ---

  - id: grace_active
    kind: lifecycle
    when:
      target.has_initiative: grace
      target.initiative.grace.valid_until: "> now"
    then:
      abstract_state: grace
    precedence: 110

  - id: emp_return_reattest
    kind: lifecycle
    when:
      subject.kind: employee
      subject.status: active
      target.pending_reattestation: true
    then:
      abstract_state: pending
      actions:
        - create_attestation_task
    precedence: 60

  # --- Employee leave ---

  - id: emp_leave_birthright_suspend
    kind: lifecycle
    when:
      subject.kind: employee
      subject.status: on_leave
      target.has_initiative: birthright
    then:
      abstract_state: suspended
    precedence: 52

  - id: emp_leave_requested_revoke
    kind: lifecycle
    when:
      subject.kind: employee
      subject.status: on_leave
      target.has_initiative: requested
    then:
      abstract_state: disabled
      signals:
        - reattest_on_return
    precedence: 50

  - id: emp_leave_requested_cancel_attestation
    kind: lifecycle
    when:
      subject.kind: employee
      subject.status: on_leave
      target.has_initiative: requested
      target.has_pending_attestation: true
    then:
      actions:
        - cancel_pending_attestation
    precedence: 51

  # --- NHI lifecycle ---

  - id: nhi_owner_terminated
    kind: lifecycle
    when:
      subject.kind: nhi
      subject.owner.status: terminated
    then:
      abstract_state: disabled
      actions:
        - revoke_nhi_access
      signals:
        - orphaned_nhi
    precedence: 100

  - id: nhi_expired
    kind: lifecycle
    when:
      subject.kind: nhi
      subject.expires_at: "<= now"
    then:
      abstract_state: disabled
    precedence: 95

  - id: nhi_locked
    kind: lifecycle
    when:
      subject.kind: nhi
      subject.status: locked
    then:
      abstract_state: disabled
      signals:
        - nhi_admin_locked
    precedence: 92

  - id: nhi_orphaned
    kind: lifecycle
    when:
      subject.kind: nhi
      subject.owner: null
    then:
      abstract_state: suspended
      signals:
        - orphaned_nhi_review
    precedence: 90

  - id: nhi_expiring_soon
    kind: lifecycle
    when:
      subject.kind: nhi
      subject.status: active
      subject.expires_at: "now..now+30d"
    then:
      signals:
        - rotation_needed
    precedence: 80

  - id: nhi_owner_on_leave
    kind: lifecycle
    when:
      subject.kind: nhi
      subject.owner.status: on_leave
    then:
      abstract_state: suspended
    precedence: 50

  - id: nhi_active
    kind: lifecycle
    when:
      subject.kind: nhi
      subject.status: active
    then:
      abstract_state: enabled
    precedence: 10

  # --- Customer (CIAM) lifecycle ---

  - id: cust_banned
    kind: lifecycle
    when:
      subject.kind: customer
      subject.status: banned
    then:
      abstract_state: disabled
      actions:
        - revoke_all_sessions
        - purge_api_keys
    precedence: 100

  - id: cust_deletion_requested
    kind: lifecycle
    when:
      subject.kind: customer
      subject.status: deletion_requested
    then:
      abstract_state: grace
      actions:
        - revoke_new_sessions
        - schedule_data_deletion
      signals:
        - gdpr_deletion_pending
    precedence: 95

  - id: cust_tenant_suspended
    kind: lifecycle
    when:
      subject.kind: customer
      subject.tenant_status: suspended
    then:
      abstract_state: suspended
      signals:
        - tenant_suspension
    precedence: 90

  - id: cust_trial_expired
    kind: lifecycle
    when:
      subject.kind: customer
      target.has_initiative: trial
      target.initiative.trial.valid_until: "<= now"
    then:
      abstract_state: disabled
      actions:
        - show_upgrade_prompt
      signals:
        - trial_expired
    precedence: 85

  - id: cust_suspended
    kind: lifecycle
    when:
      subject.kind: customer
      subject.status: suspended
    then:
      abstract_state: suspended
      actions:
        - restrict_to_readonly
    precedence: 80

  - id: cust_consent_withdrawn
    kind: lifecycle
    when:
      subject.kind: customer
      subject.required_consents_met: false
    then:
      abstract_state: disabled
      signals:
        - consent_violation
    precedence: 75

  - id: cust_not_verified
    kind: lifecycle
    when:
      subject.kind: customer
      subject.status: registered
      subject.email_verified: false
    then:
      abstract_state: pending
      actions:
        - send_verification_email
    precedence: 50

  - id: cust_verified
    kind: lifecycle
    when:
      subject.kind: customer
      subject.status: verified
    then:
      abstract_state: enabled
    precedence: 40

  - id: cust_trial_expiring
    kind: lifecycle
    when:
      subject.kind: customer
      target.has_initiative: trial
      target.initiative.trial.valid_until: "now..now+7d"
    then:
      signals:
        - trial_expiring_soon
    precedence: 30

  - id: cust_active
    kind: lifecycle
    when:
      subject.kind: customer
      subject.status: active
    then:
      abstract_state: enabled
    precedence: 10

  # --- IDP subject-level (target: null) — employee ---

  - id: idp_emp_terminated
    kind: lifecycle
    when:
      subject.kind: employee
      subject.status: terminated
      target: null
    then:
      abstract_state: disabled
      actions:
        - revoke_all_sessions
        - disable_idp_account
    precedence: 100

  - id: idp_emp_on_leave
    kind: lifecycle
    when:
      subject.kind: employee
      subject.status: on_leave
      target: null
    then:
      abstract_state: suspended
      actions:
        - revoke_all_sessions
    precedence: 50

  - id: idp_emp_pre_hire
    kind: lifecycle
    when:
      subject.kind: employee
      subject.status: hired
      subject.start_date: "> now"
      target: null
    then:
      abstract_state: pending
      actions:
        - schedule_create_idp_account: subject.start_date
    precedence: 40

  - id: idp_emp_hire_day
    kind: lifecycle
    when:
      subject.kind: employee
      subject.status: hired
      subject.start_date: "<= now"
      target: null
    then:
      abstract_state: enabled
      actions:
        - create_idp_account
        - send_welcome_email
    precedence: 40
